<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Doctors - MedCare</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link rel="stylesheet" href="css/style.css">

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">
<a class="navbar-brand" href="index.html">MedCare</a>
</div>
</nav>

<section class="container py-5">

<h1 class="text-center mb-5">Our Doctors</h1>

<input type="text"
id="searchDoctor"
class="form-control mb-4"
placeholder="Search Doctor">

<div class="row" id="doctorContainer">

<div class="col-md-4 doctor-item">
<div class="doctor-card">

<img src="https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?w=500">

<h4 class="mt-3">Dr. John Smith</h4>
<p>Cardiologist</p>

</div>
</div>

<div class="col-md-4 doctor-item">
<div class="doctor-card">

<img src="https://images.unsplash.com/photo-1559839734-2b71ea197ec2?w=500">

<h4 class="mt-3">Dr. Sarah Johnson</h4>
<p>Neurologist</p>

</div>
</div>

<div class="col-md-4 doctor-item">
<div class="doctor-card">

<img src="https://i.pinimg.com/736x/74/5a/1d/745a1d706c26dc739162d115d9e6fb24.jpg">

<h4 class="mt-3">Dr. Michael Lee</h4>
<p>Dentist</p>

</div>
</div>

</div>

</section>
<!-- Search Doctor -->
<section class="doctor-search">
    <input type="text" id="doctorSearch" placeholder="Search Doctor...">
</section>

<!-- Doctor Cards -->
<section class="doctor-container">

    <div class="doctor-card">
        <img src="https://i.pinimg.com/736x/f1/63/8a/f1638a3b734fa2c73a05cc1893f5796e.jpg" alt="Doctor">
        <h3>Dr. John Smith</h3>
        <p>Cardiologist</p>
        <span class="available">Available</span>
    </div>

    <div class="doctor-card">
        <img src="https://i.pinimg.com/1200x/1e/03/fd/1e03fd220fe0bea0cc0f402b15b7db31.jpg" alt="Doctor">
        <h3>Dr. Sarah Lee</h3>
        <p>Neurologist</p>
        <span class="available">Available</span>
    </div>

    <div class="doctor-card">
        <img src="https://i.pinimg.com/1200x/47/fe/61/47fe61549d4d55d6fb9410228b3331fb.jpg" alt="Doctor">
        <h3>Dr. Michael Brown</h3>
        <p>Orthopedic Surgeon</p>
        <span class="busy">Busy</span>
    </div>

    <div class="doctor-card">
        <img src="https://i.pinimg.com/736x/48/22/9e/48229ee3f32e4d13780c1360cd6a307d.jpg" alt="Doctor">
        <h3>Dr. Emily Wilson</h3>
        <p>Pediatrician</p>
        <span class="available">Available</span>
    </div>

</section>

<script>

const search=document.getElementById("searchDoctor");

search.addEventListener("keyup",()=>{

let filter=search.value.toLowerCase();

let doctors=document.querySelectorAll(".doctor-item");

doctors.forEach(card=>{

let text=card.innerText.toLowerCase();

card.style.display=text.includes(filter)?"block":"none";

});

});

</script>

</body>
</html>
