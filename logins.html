<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />

  <title>HMS - Logins</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Navbar -->
  <header class="navbar">
    <div class="logo">HMS</div>

    <nav class="nav-links">

      <a href="#">Services</a>

  <!-- Login Section -->
  <section class="login-page">
    <h1 class="login-title">Logins</h1>

    <div class="login-cards">

          <h2>Patient Login</h2>
          <a href="#" class="login-btn">Click Here</a>

      </div>

      <!-- Doctor -->
      <div class="login-card">
        <img src="images/doc.jpg" alt="Doctors Login">
        <div class="card-content">
          <h2>Doctors login</h2>
          <a href="#" class="login-btn">Click Here</a>
        </div>
      </div>

      <!-- Admin -->
      <div class="login-card">
        <img src="images/admin.jpg" alt="Admin Login">
        <div class="card-content">
          <h2>Admin Login</h2>
          <a href="#" class="login-btn">Click Here</a>
        </div>
      </div>

    </div>
